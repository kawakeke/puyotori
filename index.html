<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>しりとりハント3D</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #1b2740 0%, #0c1120 60%, #060812 100%);
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
    color: #eef2ff;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  #gl {
    position: absolute; inset: 0;
  }
  #game {
    position: absolute; inset: 0;
    touch-action: none;
    cursor: none; /* あみカーソルを canvas に描く */
  }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 12px 0;
    gap: 6px;
    z-index: 5;
  }
  #topbar {
    width: 100%; max-width: 720px;
    display: flex; align-items: center; gap: 12px;
  }
  .scorebox {
    background: rgba(6, 18, 32, .8);
    border: 1px solid rgba(90, 220, 255, .4);
    border-radius: 2px;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    padding: 6px 14px;
    font-size: 14px;
    min-width: 92px;
    text-align: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 14px rgba(60, 180, 255, .12);
  }
  .scorebox b { font-size: 20px; display: block; }
  #scoreYou b { color: #ffd966; }
  #scoreCpu b { color: #ff8a8a; }
  #timewrap { flex: 1; }
  #timebarBg {
    height: 12px; border-radius: 2px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(90, 220, 255, .35);
    box-shadow: 0 0 12px rgba(60, 180, 255, .15);
    overflow: hidden;
  }
  #timebar {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #4dd2ff, #4d7cff);
    border-radius: 6px;
    transition: width .2s linear;
  }
  #timeleft { text-align: center; font-size: 12px; margin-top: 2px; opacity: .85; }
  #btnSurrender {
    pointer-events: auto;
    background: rgba(6, 18, 32, .8);
    border: 1px solid rgba(90, 220, 255, .3);
    color: #aab8e0;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  #btnSurrender:hover { background: #31406e; color: #fff; }
  #odai {
    background: rgba(6, 18, 32, .8);
    border: 1px solid rgba(90, 220, 255, .55);
    border-radius: 2px;
    clip-path: polygon(14px 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 14px 100%, 0 50%);
    padding: 8px 30px;
    font-size: 17px;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 20px rgba(60, 180, 255, .18);
  }
  #odai .kana {
    display: inline-block;
    font-size: 30px; font-weight: bold; color: #ffd966;
    min-width: 36px; text-align: center;
    text-shadow: 0 0 12px rgba(255, 217, 102, .6);
  }
  #combo {
    min-height: 26px;
    font-size: 19px; font-weight: bold; color: #ffb84d;
    text-shadow: 0 0 12px rgba(255, 160, 60, .8), 0 1px 4px #000;
  }
  @keyframes comboPop {
    0% { transform: scale(1.7); }
    100% { transform: scale(1); }
  }
  #chain {
    position: absolute; bottom: 12px; left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    color: #b9c4e8;
    pointer-events: none;
    z-index: 5;
    padding: 0 10px;
    text-shadow: 0 1px 4px #000;
  }
  #chain .now { color: #ffd966; font-weight: bold; }

  /* ---------- overlay ---------- */
  #overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5, 8, 18, .78);
    z-index: 10;
    backdrop-filter: blur(3px);
  }
  #overlay.hidden { display: none; }
  .panel {
    position: relative;
    overflow: hidden;
    background: rgba(6, 18, 32, .92);
    border: 1px solid rgba(90, 220, 255, .5);
    clip-path: polygon(20px 0, calc(100% - 20px) 0, 100% 20px, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px), 0 20px);
    padding: 28px 34px;
    max-width: 480px;
    width: calc(100% - 48px);
    box-sizing: border-box;
    text-align: center;
    box-shadow: 0 0 44px rgba(60, 180, 255, .14), inset 0 0 70px rgba(60, 180, 255, .05);
  }
  .panel::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(120, 220, 255, .035) 0 1px, transparent 1px 3px);
  }
  .panel h1 {
    margin: 0 0 4px; font-size: 30px; letter-spacing: 4px;
    text-shadow: 0 0 18px rgba(120, 220, 255, .45);
  }
  .panel h1 .mini { font-size: 15px; color: #8fa2d8; display: block; letter-spacing: 1px; margin-top: 4px; }
  .rules {
    text-align: left; font-size: 14px; line-height: 1.85;
    margin: 18px 0 20px; color: #ccd6f5;
  }
  .rules b { color: #ffd966; }
  .btnrow { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btnrow button {
    font-size: 16px; font-family: inherit;
    padding: 12px 22px;
    border-radius: 2px; border: none; cursor: pointer;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    color: #fff; font-weight: bold;
    transition: transform .1s, filter .1s;
  }
  .btnrow button:hover { transform: scale(1.06); filter: brightness(1.15); }
  #btnEasy   { background: #3aa864; }
  #btnNormal { background: #4d7cff; }
  #btnHard   { background: #d5544d; }
  .btnrow button.packbtn {
    background: #232c4e;
    border: 2px solid transparent;
    font-size: 15px;
  }
  .btnrow button.packbtn.sel {
    border-color: #ffd966;
    background: #31406e;
  }
  #resultTitle { font-size: 34px; margin: 0 0 10px; }
  /* ---------- イントロ (辞令) ---------- */
  #introScene {
    position: relative;
    height: 150px;
    margin: 4px 0 12px;
    overflow: hidden;
  }
  #introUfo {
    font-size: 44px;
    position: absolute; left: 50%; top: 4px;
    animation: ufoHover 3.2s ease-in-out infinite;
  }
  @keyframes ufoHover {
    0%, 100% { transform: translate(-62%, 0); }
    50%      { transform: translate(-38%, 9px); }
  }
  #introBeam {
    position: absolute; left: 50%; top: 48px;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 62px solid rgba(140, 240, 255, .16);
    animation: beamPulse 2s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  #introJapan {
    font-size: 58px;
    position: absolute; left: 50%; bottom: 0;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 14px rgba(80, 160, 255, .55));
  }
  #introText {
    text-align: left;
    font-size: 14px;
    line-height: 1.95;
    color: #ccd6f5;
    margin: 0 0 18px;
  }
  #introText .jirei {
    display: block;
    text-align: center;
    font-size: 17px;
    letter-spacing: 6px;
    color: #eef2ff;
    margin-bottom: 8px;
  }
  #introText .warn { color: #ffd966; }
  #storyLink {
    font-size: 12px;
    color: #8fa2d8;
    text-decoration: underline;
    cursor: pointer;
    margin-top: 4px;
  }
  @media (max-width: 480px){
    .panel { padding: 20px 16px; }
    .panel h1 { font-size: 24px; }
    .panel h1 .mini { font-size: 12px; }
    .rules { font-size: 13px; line-height: 1.8; margin: 14px 0 16px; }
    .btnrow button { font-size: 14px; padding: 10px 14px; }
  }
  #resultDetail { font-size: 15px; color: #ccd6f5; line-height: 1.8; margin-bottom: 18px; }
  #resultChain {
    font-size: 13px; color: #8fa2d8; line-height: 1.7;
    max-height: 120px; overflow-y: auto;
    margin-bottom: 18px;
    background: rgba(0,0,0,.25); border-radius: 8px; padding: 8px 12px;
  }
</style>
</head>
<body>

<canvas id="gl"></canvas>
<canvas id="game"></canvas>

<div id="hud" style="display:none">
  <div id="topbar">
    <div class="scorebox" id="scoreYou">あなた<b>0</b></div>
    <div id="timewrap">
      <div id="timebarBg"><div id="timebar"></div></div>
      <div id="timeleft">90</div>
    </div>
    <div class="scorebox" id="scoreCpu">🛸 同期<b>0</b></div>
    <button id="btnSurrender">降参</button>
  </div>
  <div id="odai">「<span class="kana" id="odaiKana">り</span>」から始まるものを回収せよ</div>
  <div id="combo"></div>
</div>
<div id="chain" style="display:none"></div>

<div id="overlay">
  <div class="panel" id="introPanel" style="display:none">
    <div id="introScene">
      <div id="introUfo">🛸</div>
      <div id="introBeam"></div>
      <div id="introJapan">🗾</div>
    </div>
    <div id="introText">
      <span class="jirei">【辞　令】</span>
      あなたを 地球・日本方面 <b>潜入要員</b>に任命する。<br>
      着任前に、現地語の実地研修を命ずる。<br>
      <br>
      課題は「<b>しりとり</b>」。現地の言語遊戯である。<br>
      <span class="warn">「ん」で終わる語は正体が露見するため回収禁止。</span><br>
      なお、<b>同期</b>も同じ言葉を狙っている。<br>
      成績は母星に報告される。健闘を祈る。
    </div>
    <div class="btnrow">
      <button id="btnIntroNext" style="background:#4d7cff">研修をはじめる</button>
    </div>
  </div>
  <div class="panel" id="startPanel">
    <h1>しりとりハント3D<span class="mini">— 地球潜入研修・日本語実習 —</span></h1>
    <div id="recordLine" style="font-size:13px;color:#8fa2d8;min-height:18px;margin-top:6px"></div>
    <div id="storyLink">▶ 辞令を読み直す</div>
    <div class="rules">
      🌌 ドラッグで見回す<br>
      👆 <b>長押し</b>、または<b>2回タップして囲む</b>と回収<br>
      🛸 <b>同期</b>より先に。<b>長い言葉ほど高得点</b><br>
      ⚠️ 「<b>ん</b>」で終わる言葉は禁句。<b>正体が露見します</b>
    </div>
    <div style="font-size:13px;color:#8fa2d8;margin-bottom:6px">ことばセット</div>
    <div class="btnrow" style="margin-bottom:16px">
      <button id="packEmoji" class="packbtn">🍎 定番</button>
      <button id="packKanji" class="packbtn">難 漢字</button>
      <button id="packBitter" class="packbtn sel">👔 サラリーマン</button>
    </div>
    <div class="btnrow">
      <button id="btnEasy">接待（易）</button>
      <button id="btnNormal">定時（並）</button>
      <button id="btnHard">激務（難）</button>
    </div>
  </div>
  <div class="panel" id="resultPanel" style="display:none">
    <h1 id="resultTitle"></h1>
    <div id="resultDetail"></div>
    <div id="resultChain"></div>
    <div id="nextComment" style="font-size:13px;color:#8fd8ff;min-height:18px;margin-bottom:10px"></div>
    <div class="btnrow">
      <button id="btnNext" style="background:#18a999;display:none"></button>
      <button id="btnRetry" style="background:#4d7cff">もういちど</button>
      <button id="btnTop" style="background:#555f7a">TOPへ戻る</button>
    </div>
  </div>
</div>

<script>

/* 世界(星・星雲・床グリッド・アイテム・UFO)はWebGL、UI(網・なわ・文字)は2Dキャンバスの2層構成 */
let shakeYaw = 0, shakePitch = 0; // 画面シェイク = カメラの揺れ (両レイヤー共通)

const gl = glc.getContext("webgl", { alpha: true, premultipliedAlpha: false, antialias: true, depth: true });
if (!gl) console.error("WebGL が利用できません");

function glProgram(vsSrc, fsSrc){
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vsSrc); gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsSrc); gl.compileShader(fs);
  const pr = gl.createProgram();
  gl.attachShader(pr, vs); gl.attachShader(pr, fs);
  gl.linkProgram(pr);
  if (!gl.getProgramParameter(pr, gl.LINK_STATUS)){
    console.error(gl.getShaderInfoLog(vs), gl.getShaderInfoLog(fs), gl.getProgramInfoLog(pr));
  }
  return pr;
}
function makeProg(vs, fs, attrs, unis){
  const o = { prog: glProgram(vs, fs), a: {}, u: {} };
  for (const a of attrs) o.a[a] = gl.getAttribLocation(o.prog, a);
  for (const u of unis) o.u[u] = gl.getUniformLocation(o.prog, u);
  return o;
}

/* ビルボード (アイテム・グロー) */
const BILL = gl && makeProg(`
  attribute vec2 a_corner;
  uniform mat4 u_vp;
  uniform vec3 u_center, u_right, u_up;
  uniform vec2 u_size;
  varying vec2 v_uv;
  varying float v_z;
  void main(){
    vec3 wp = u_center + u_right * (a_corner.x * u_size.x) + u_up * (a_corner.y * u_size.y);
    vec4 cp = u_vp * vec4(wp, 1.0);
    v_z = cp.w;
    v_uv = a_corner * vec2(0.5, -0.5) + 0.5;
    gl_Position = cp;
  }`, `
  precision mediump float;
  uniform sampler2D u_tex;
  uniform vec4 u_tint;
  uniform float u_fogK;
  varying vec2 v_uv;
  varying float v_z;
  void main(){
    vec4 c = texture2D(u_tex, v_uv) * u_tint;
    float fog = clamp((v_z - 6.0) / 28.0, 0.0, 0.75) * u_fogK;
    c.rgb = mix(c.rgb, vec3(0.05, 0.07, 0.14), fog);
    c.a *= 1.0 - fog * 0.5;
    gl_FragColor = c;
  }`,
  ["a_corner"], ["u_vp","u_center","u_right","u_up","u_size","u_tex","u_tint","u_fogK"]);

/* ほし (ポイントスプライト) */
const PT = gl && makeProg(`
  attribute vec3 a_pos;
  attribute float a_phase;
  uniform mat4 u_vp;
  uniform float u_t, u_dpr;
  varying float v_a;
  void main(){
    vec4 cp = u_vp * vec4(a_pos, 1.0);
    gl_Position = cp;
    gl_PointSize = max(u_dpr * 140.0 / max(cp.w, 1.0), 1.0);
    v_a = 0.25 + 0.3 * (0.5 + 0.5 * sin(u_t * 1.3 + a_phase));
  }`, `
  precision mediump float;
  varying float v_a;
  void main(){
    vec2 d = gl_PointCoord - 0.5;
    float a = smoothstep(0.25, 0.02, dot(d, d)) * v_a;
    gl_FragColor = vec4(0.62, 0.71, 0.91, a);
  }`,
  ["a_pos","a_phase"], ["u_vp","u_t","u_dpr"]);

/* ライン (床グリッド) */
const LINE = gl && makeProg(`
  attribute vec3 a_pos;
  uniform mat4 u_vp;
  varying float v_z;
  void main(){ vec4 cp = u_vp * vec4(a_pos, 1.0); v_z = cp.w; gl_Position = cp; }`, `
  precision mediump float;
  uniform vec4 u_color;
  varying float v_z;
  void main(){
    float fog = clamp((v_z - 6.0) / 28.0, 0.0, 0.9);

  }`,
  ["a_pos"], ["u_vp","u_color"]);

/* ライティング付きメッシュ (UFO) */
const MESH = gl && makeProg(`
  attribute vec3 a_pos, a_nrm;
  uniform mat4 u_vp;
  uniform vec3 u_pos;
  uniform float u_spin, u_scale;
  varying vec3 v_n;
  varying float v_z;
  void main(){
    float c = cos(u_spin), s = sin(u_spin);
    vec3 p = vec3(a_pos.x * c - a_pos.z * s, a_pos.y, a_pos.x * s + a_pos.z * c);
    vec3 n = vec3(a_nrm.x * c - a_nrm.z * s, a_nrm.y, a_nrm.x * s + a_nrm.z * c);
    vec4 cp = u_vp * vec4(p * u_scale + u_pos, 1.0);
    v_n = n; v_z = cp.w;
    gl_Position = cp;
  }`, `
  precision mediump float;
  uniform vec3 u_color;
  varying vec3 v_n;
  varying float v_z;
  void main(){
    vec3 L = normalize(vec3(0.4, 0.8, -0.45));
    float d = max(dot(normalize(v_n), L), 0.0);
    vec3 c = u_color * (0.35 + 0.75 * d);
    float fog = clamp((v_z - 6.0) / 28.0, 0.0, 0.75);
    c = mix(c, vec3(0.05, 0.07, 0.14), fog);
    gl_FragColor = vec4(c, 1.0);
  }`,
  ["a_pos","a_nrm"], ["u_vp","u_pos","u_spin","u_scale","u_color"]);

  const sv = [];
  for (const s of stars){
    const ce = Math.cos(s.el);
    sv.push(s.r * ce * Math.sin(s.az), s.r * Math.sin(s.el), s.r * ce * Math.cos(s.az), s.tw);
  }
  starCount = stars.length;
  starBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, starBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(sv), gl.STATIC_DRAW);

  // 床グリッド (リング + スポーク)
  const gv = [];
  const GY = -5;
  for (let ri = 1; ri <= 9; ri++){
    const r = ri * 4, seg = 48;
    for (let s = 0; s < seg; s++){
      const a0 = s / seg * Math.PI * 2, a1 = (s + 1) / seg * Math.PI * 2;
      gv.push(Math.cos(a0) * r, GY, Math.sin(a0) * r, Math.cos(a1) * r, GY, Math.sin(a1) * r);
    }
  }
  for (let s = 0; s < 24; s++){
    const a = s / 24 * Math.PI * 2;
    gv.push(Math.cos(a) * 4, GY, Math.sin(a) * 4, Math.cos(a) * 36, GY, Math.sin(a) * 36);
  }
  gridCount = gv.length / 3;
  gridBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, gridBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(gv), gl.STATIC_DRAW);

  // UFO ソーサー (回転体)
  const prof = [[0.0,-0.10],[0.40,-0.10],[0.58,0.02],[0.42,0.14],[0.22,0.30],[0.0,0.34]];
  const uv = [], seg = 24;
  for (let i = 0; i < prof.length - 1; i++){
    const r0 = prof[i][0], y0 = prof[i][1], r1 = prof[i+1][0], y1 = prof[i+1][1];
    const dx = r1 - r0, dy = y1 - y0;
    const nl = Math.hypot(dx, dy) || 1;
    const nr = dy / nl, ny = -dx / nl;
    for (let s = 0; s < seg; s++){
      const a0 = s / seg * Math.PI * 2, a1 = (s + 1) / seg * Math.PI * 2;
      const c0 = Math.cos(a0), s0 = Math.sin(a0), c1 = Math.cos(a1), s1 = Math.sin(a1);
      const quad = [
        [r0*c0, y0, r0*s0, nr*c0, ny, nr*s0],
        [r1*c0, y1, r1*s0, nr*c0, ny, nr*s0],
        [r1*c1, y1, r1*s1, nr*c1, ny, nr*s1],
        [r0*c0, y0, r0*s0, nr*c0, ny, nr*s0],
        [r1*c1, y1, r1*s1, nr*c1, ny, nr*s1],
        [r0*c1, y0, r0*s1, nr*c1, ny, nr*s1]
      ];
      for (const vt of quad) uv.push(...vt);
    }
  }
  ufoCount = uv.length / 6;
  ufoBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, ufoBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(uv), gl.STATIC_DRAW);

  // 共有グローテクスチャ (放射グラデーション)
  const gc = document.createElement("canvas");
  gc.width = gc.height = 64;
  const gcx = gc.getContext("2d");
  const gr = gcx.createRadialGradient(32, 32, 0, 32, 32, 32);
  gr.addColorStop(0, "rgba(255,255,255,1)");
  gr.addColorStop(1, "rgba(255,255,255,0)");
  gcx.fillStyle = gr;
  gcx.fillRect(0, 0, 64, 64);
  glowTex = makeTexFromCanvas(gc);
}

function makeTexFromCanvas(cv){
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, cv);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}

/* アイテムのテクスチャ (絵文字/漢字 + ラベル + バッジ を焼き込む) */
const texCanvas = document.createElement("canvas");
texCanvas.width = 256; texCanvas.height = 256;
const tctx = texCanvas.getContext("2d");

function getItemTex(it){
  if (!it.tex || it.texBonus !== state.bonus){
    if (it.tex) gl.deleteTexture(it.tex);
    paintItemTexture(it);
    it.tex = makeTexFromCanvas(texCanvas);
    it.texBonus = state.bonus;

}
function freeItemTex(it){

}

/* カメラ行列 (2D側の project() と厳密に同じ投影) */
function vpMatrix(yaw, pitch){
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const A = 2 * focal / W, B = 2 * focal / H;
  const near = 0.5, far = 120;
  const pa = (far + near) / (far - near), pb = -2 * far * near / (far - near);
  return {
    m: new Float32Array([
      A * cy,    B * (-sp * sy), pa * (cp * sy), cp * sy,
      0,         B * cp,         pa * sp,        sp,
      A * (-sy), B * (-sp * cy), pa * (cp * cy), cp * cy,
      0,         0,              pb,             0
    ]),
    right: [cy, 0, -sy],
    up: [-sp * sy, cp, -sp * cy]
  };
}
function worldPos(az, el, r){
  const ce = Math.cos(el);
  return [r * ce * Math.sin(az), r * Math.sin(el), r * ce * Math.cos(az)];
}
function viewZ(vp, p){ return vp.m[3] * p[0] + vp.m[7] * p[1] + vp.m[11] * p[2]; }
function ufoWorld(){
  const p = worldPos(cpu.az, cpu.el, 9);
  p[1] += Math.sin(now * 2.4) * 0.12;
  return p;
}

function bindAttr(buf, loc, size, stride, offset){
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, size, gl.FLOAT, false, stride, offset);
}
function drawBillboard(vp, pos, sx, sy, tex, tint, fogK){
  gl.uniform3f(BILL.u.u_center, pos[0], pos[1], pos[2]);
  gl.uniform2f(BILL.u.u_size, sx, sy);
  gl.uniform4fv(BILL.u.u_tint, tint);
  gl.uniform1f(BILL.u.u_fogK, fogK);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
function useBill(vp){
  gl.useProgram(BILL.prog);
  bindAttr(quadBuf, BILL.a.a_corner, 2, 0, 0);
  gl.uniformMatrix4fv(BILL.u.u_vp, false, vp.m);
  gl.uniform3f(BILL.u.u_right, vp.right[0], vp.right[1], vp.right[2]);
  gl.uniform3f(BILL.u.u_up, vp.up[0], vp.up[1], vp.up[2]);
  gl.uniform1i(BILL.u.u_tex, 0);
}

/* 世界の描画 */
function drawWorld(){
  if (!gl) return;
  gl.viewport(0, 0, glc.width, glc.height);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  const vp = vpMatrix(state.yaw + shakeYaw, state.pitch + shakePitch);
  gl.enable(gl.DEPTH_TEST);
  gl.depthFunc(gl.LEQUAL);
  gl.enable(gl.BLEND);
  gl.depthMask(false);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  // ほし
  gl.useProgram(PT.prog);
  bindAttr(starBuf, PT.a.a_pos, 3, 16, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, starBuf);
  gl.enableVertexAttribArray(PT.a.a_phase);
  gl.vertexAttribPointer(PT.a.a_phase, 1, gl.FLOAT, false, 16, 12);
  gl.uniformMatrix4fv(PT.u.u_vp, false, vp.m);
  gl.uniform1f(PT.u.u_t, now);
  gl.uniform1f(PT.u.u_dpr, DPR);
  gl.drawArrays(gl.POINTS, 0, starCount);
  gl.disableVertexAttribArray(PT.a.a_phase);

  // 床グリッド
  gl.useProgram(LINE.prog);
  bindAttr(gridBuf, LINE.a.a_pos, 3, 0, 0);
  gl.uniformMatrix4fv(LINE.u.u_vp, false, vp.m);
  gl.uniform4f(LINE.u.u_color, 0.38, 0.50, 0.82, 0.22);
  gl.drawArrays(gl.LINES, 0, gridCount);

  // 星雲 (加算グロー)
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  useBill(vp);
  for (const n of NEBULAE){
    const c = n.color.split(",").map(Number);
    drawBillboard(vp, worldPos(n.az, n.el, n.r), n.size, n.size, glowTex,
      [c[0]/255, c[1]/255, c[2]/255, 0.18], 0);
  }
  // 眼下の地球 (夜の日本上空に浮いている、という設定)
  drawBillboard(vp, [0, -26, 0], 22, 22, glowTex, [0.25, 0.5, 0.85, 0.4], 0);
  drawBillboard(vp, [0, -24, 0], 9, 9, glowTex, [1.0, 0.72, 0.35, 0.3], 0);

  // UFO (ライティング付き回転メッシュ) + グロー + トレイル
  if (state.running){
    const up = ufoWorld();
    gl.depthMask(true);
    gl.disable(gl.BLEND);
    gl.useProgram(MESH.prog);
    bindAttr(ufoBuf, MESH.a.a_pos, 3, 24, 0);
    gl.bindBuffer(gl.ARRAY_BUFFER, ufoBuf);
    gl.enableVertexAttribArray(MESH.a.a_nrm);
    gl.vertexAttribPointer(MESH.a.a_nrm, 3, gl.FLOAT, false, 24, 12);
    gl.uniformMatrix4fv(MESH.u.u_vp, false, vp.m);
    gl.uniform3f(MESH.u.u_pos, up[0], up[1], up[2]);
    gl.uniform1f(MESH.u.u_spin, now * 1.6);
    gl.uniform1f(MESH.u.u_scale, 0.9);
    gl.uniform3f(MESH.u.u_color, 0.62, 0.70, 0.85);
    gl.drawArrays(gl.TRIANGLES, 0, ufoCount);
    gl.disableVertexAttribArray(MESH.a.a_nrm);
    gl.depthMask(false);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    useBill(vp);
    drawBillboard(vp, [up[0], up[1] - 0.3, up[2]], 1.4, 1.4, glowTex, [0.55, 0.95, 1.0, 0.25], 0);
    if (now - lastTrail > 0.05){
      lastTrail = now;
      cpuTrail.push({ az: cpu.az, el: cpu.el, t: now });
      if (cpuTrail.length > 14) cpuTrail.shift();
    }
    for (const tr of cpuTrail){
      const age = now - tr.t;
      if (age > 0.5) continue;
      drawBillboard(vp, worldPos(tr.az, tr.el, 9), 0.45, 0.45, glowTex,
        [0.6, 0.9, 1.0, 0.3 * (1 - age / 0.5)], 0);
    }
  }

  // アイテム (奥から手前へ)
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  const list = [];
  for (const it of state.items){
    let s = 1.24 * it.sizeF, alpha = 1, tint = null;
    let az = it.az, el = it.el + bob(it), r = it.r;
    let center = null;
    if (it.state === "gone"){
      const t = (now - it.goneT) / 0.45;
      if (t >= 1) continue;
      alpha = 1 - t;
      if (it.goneBy === "you"){
        s *= 1 - t * 0.65;
        az += Math.sin(now * 45) * 0.006 * (1 - t);
      } else if (it.goneBy === "cpu"){
        s *= 1 - t * 0.7;
        const a = worldPos(az, el, r), b = ufoWorld();
        center = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
      } else {
        s *= 1 + t * 0.8;
        tint = [1, 0.45, 0.45, alpha]; // トラップは赤く弾ける
      }
    } else {
      const t = Math.min((now - it.born) / 0.35, 1);
      s *= 0.4 + 0.6 * t;
      if (it.scared && now - it.scared < 0.25){
        az += Math.sin(now * 50 + it.phase * 10) * 0.004;
        el += Math.cos(now * 47 + it.phase * 10) * 0.004;
      }
    }
    if (!center) center = worldPos(az, el, r);
    const z = viewZ(vp, center);
    if (z < 0.5) continue;
    list.push({ it, center, z, s, tint: tint || [1, 1, 1, alpha] });
  }
  list.sort((a, b) => b.z - a.z);
  useBill(vp);
  for (const o of list){
    drawBillboard(vp, o.center, o.s, o.s, getItemTex(o.it), o.tint, 1);
  }
}

/* ================= 投影 ================= */
function project(az, el, r){
  const yawE = state.yaw + shakeYaw, pitchE = state.pitch + shakePitch;
  const ca = Math.cos(az - yawE), sa = Math.sin(az - yawE);
  const ce = Math.cos(el), se = Math.sin(el);
  const x = r * ce * sa;
  const y = r * se;
  const z = r * ce * ca;
  const cp = Math.cos(pitchE), sp = Math.sin(pitchE);
  const y2 = y * cp - z * sp;
  const z2 = y * sp + z * cp;
  if (z2 < 0.5) return null;
  const s = focal / z2;
  return { x: W / 2 + x * s, y: H / 2 - y2 * s, scale: s, z: z2 };
}
function angDiff(a){
  return ((a + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
}

/* ================= アイテム ================= */
let now = 0; // 秒 (performance.now/1000)

function wordPoints(w){ return Array.from(w).length * 5; }

function spawnItem(entry){
  const len = Array.from(entry.w).length;
  // ながいことば = 高とくてん・ちいさい・すばやい
  const sizeF = Math.max(0.55, 1.18 - len * 0.11);
  const spd = 0.025 + (len - 2) * 0.02;
  const dir = Math.random() * Math.PI * 2;
  state.items.push({
    word: entry.w, emoji: entry.e || null, kanji: entry.k || null, trap: entry.trap,
    len, pts: wordPoints(entry.w), sizeF,
    vaz: Math.cos(dir) * spd, vel: Math.sin(dir) * spd,
    // 追加位置は完全ランダム (2026-07-16 ユーザー指定)
    az: Math.random() * Math.PI * 2,
    el: Math.random() * 0.88 - 0.4,
    r: 6 + Math.random() * 8,
    phase: Math.random() * Math.PI * 2,
    born: now,
    state: "alive", goneT: 0, goneBy: null
  });
}
function onField(word){ return state.items.some(it => it.state === "alive" && it.word === word); }
function unusedEntries(pred){
  return state.dict.filter(d => !state.usedWords.has(d.w) && !onField(d.w) && (!pred || pred(d)));
}
function aliveItems(){ return state.items.filter(it => it.state === "alive"); }
function validItems(){
  return aliveItems().filter(it => !it.trap && firstKana(it.word) === state.requiredKana);
}

function ensureAnswers(){
  // お題のこたえを最低 MIN_ANSWERS こ フィールドに用意する
  let valid = validItems().length;
  while (valid < MIN_ANSWERS){
    const cands = unusedEntries(d => !d.trap && firstKana(d.w) === state.requiredKana);
    if (cands.length === 0) break;
    spawnItem(cands[Math.floor(Math.random() * cands.length)]);
    valid++;
  }
  if (validItems().length === 0){
    reshuffleKana();
    return;
  }
  // トラップ (お題ではじまり「ん」でおわる) を混ぜる (最大2つ)
  let trapCount = aliveItems().filter(it => it.trap && firstKana(it.word) === state.requiredKana).length;
  while (trapCount < 2 && Math.random() < TRAP_CHANCE){
    const traps = unusedEntries(d => d.trap && firstKana(d.w) === state.requiredKana);
    if (!traps.length) break;
    spawnItem(traps[Math.floor(Math.random() * traps.length)]);
    trapCount++;
  }
  // にぎやかし
  while (aliveItems().length < FIELD_MIN_ITEMS){
    const cands = unusedEntries();
    if (cands.length === 0) break;
    spawnItem(cands[Math.floor(Math.random() * cands.length)]);
  }
}

function reshuffleKana(){
  // つづくことばが辞書にない → おだいをチェンジ
  const counts = {};
  for (const d of unusedEntries(d => !d.trap)){
    const k = firstKana(d.w);
    counts[k] = (counts[k] || 0) + 1;
  }
  const kanas = Object.keys(counts).filter(k => counts[k] >= 2);
  if (kanas.length === 0){ endGame("ことばぎれ"); return; }
  state.requiredKana = kanas[Math.floor(Math.random() * kanas.length)];
  addMsg(`在庫切れです。お題を変更します →「${state.requiredKana}」`, "#8fd8ff");
  updateHud();
  ensureAnswers();
}

/* ================= サウンド ================= */
let audioCtx = null;
function beep(freq, dur, type, vol, delay){
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t0 = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.12, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  } catch(e){ /* noop */ }
}
const sndGet  = (streak) => {
  const m = Math.pow(1.06, Math.min(streak || 1, 10)); // コンボで音がだんだん高く
  beep(660 * m, .12, "sine"); beep(990 * m, .18, "sine", .12, .08);
};
const sndTrap = () => { beep(160, .35, "sawtooth", .15); beep(110, .4, "sawtooth", .12, .1); };
const sndCpu  = () => { beep(330, .15, "square", .07); };

/* あみ (捕虫網) の描画: rim + こうしメッシュ。progで めがこまかくなる */
function drawNet(x, y, r, alpha, prog, rot){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot || 0);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.clip();
  const step = Math.max(4, r / (2.5 + (prog || 0) * 3));
  ctx.strokeStyle = "rgba(255,224,150,.75)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let d = -r; d <= r; d += step){
    ctx.moveTo(d, -r); ctx.lineTo(d, r);
    ctx.moveTo(-r, d); ctx.lineTo(r, d);
  }
  ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = "#ffd966";
  ctx.lineWidth = Math.max(2, r * 0.09);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function updateCombo(){
  if (state.streak >= 2){
    comboEl.textContent = `🔥 コンボ ×${state.streak}`;
    comboEl.style.animation = "none";

    comboEl.style.animation = "comboPop .25s ease-out";
  } else {
    comboEl.textContent = "";
  }
}

/* ================= ピック処理 ================= */
function itemDisp(item){ return item.kanji ? `${item.kanji}（${item.word}）` : item.word; }

function playerPick(item){
  const p = project(item.az, item.el + bob(item), item.r);
  if (item.trap){
    item.state = "gone"; item.goneT = now; item.goneBy = "trap";
    state.usedWords.add(item.word);
    state.scoreYou = Math.max(0, state.scoreYou - 15);
    state.streak = 0;
    state.stunUntil = now + 2;
    if (p) burst(p.x, p.y, "#ff7070", 16);
    flash("255,80,80", 0.32);
    shake(9);
    addMsg(`「${itemDisp(item)}」…「ん」で終了。-15`, "#ff7070");
    addMsg(TRAP_QUIPS[Math.floor(Math.random() * TRAP_QUIPS.length)], "#9aa7cf", true);
    sndTrap();
    updateCombo();
    updateHud();
    ensureAnswers();
    return;
  }
  let pts = item.pts + Math.min(state.streak * 5, 25);
  if (state.bonus) pts *= 2;
  state.streak++;
  state.scoreYou += pts;
  if (item.len > Array.from(state.bestWord).length){
    state.bestWord = item.word;
    state.bestDisp = item.kanji || item.word;
  }
  if (p){
    burst(p.x, p.y, item.len >= 5 ? "#ffd966" : "#fff3c4", 20);
    popup(p.x, p.y, `+${pts}`, "#ffd966");
  }
  takeWord(item, "you");
  addMsg(`${item.emoji ? item.emoji + " " : ""}${itemDisp(item)}、回収。`, "#ffd966");
  updateCombo();
  sndGet(state.streak);
}
function cpuPick(item){
  const p = project(item.az, item.el + bob(item), item.r);
  const pts = state.bonus ? item.pts * 2 : item.pts;
  state.scoreCpu += pts;
  state.streak = 0;
  if (p){
    burst(p.x, p.y, "#ff9d9d", 14);
    popup(p.x, p.y, `CPU +${pts}`, "#ff9d9d");
  }
  flash("255,90,90", 0.14);
  shake(3);
  takeWord(item, "cpu");
  addMsg(`🛸 同期が「${itemDisp(item)}」を回収しました`, "#ff9d9d");
  updateCombo();
  sndCpu();
}
function takeWord(item, by){
  item.state = "gone"; item.goneT = now; item.goneBy = by;
  state.usedWords.add(item.word);
  state.chainLog.push(item.kanji || item.word);
  state.requiredKana = lastKana(item.word);
  if (holding && holding.item === item && by !== "you"){
    holding = null;
    addMsg("先を越されました。", "#ff9d9d");
  }
  // CPUのねらいなおし
  cpu.target = null; cpu.holdP = 0;
  cpu.wait = rand(state.diff.reaction[0], state.diff.reaction[1]);
  updateHud();
  ensureAnswers();
}
function rand(a, b){ return a + Math.random() * (b - a); }

/* ================= CPU ================= */
function cpuUpdate(dt){
  if (!state.running) return;
  if (cpu.wait > 0){ cpu.wait -= dt; return; }
  if (!cpu.target || cpu.target.state !== "alive"){
    const cands = validItems();
    cpu.holdP = 0;
    if (cands.length === 0){ cpu.wait = 0.8; cpu.target = null; return; }
    // むずかしいCPUは高とくてん、かんたんCPUは安いことばをねらう
    if (state.diff.pick === "max"){
      cpu.target = cands.reduce((a, b) => a.len >= b.len ? a : b);
    } else if (state.diff.pick === "min"){
      cpu.target = cands.reduce((a, b) => a.len <= b.len ? a : b);
    } else {
      cpu.target = cands[Math.floor(Math.random() * cands.length)];
    }
  }
  const t = cpu.target;
  const dyaw = angDiff(t.az - cpu.az);
  const del = t.el - cpu.el;
  const dist = Math.hypot(dyaw, del);
  if (dist > 0.04){
    const step = Math.min(state.diff.speed * dt, dist);
    cpu.az += dyaw / dist * step;
    cpu.el += del / dist * step;
    cpu.holdP = 0;
  } else {
    cpu.holdP += dt / state.diff.hold;
    if (cpu.holdP >= 1){ cpuPick(t); }
  }
}

/* ================= 入力 ================= */
let pointer = null; // {x,y,mode:'pending'|'drag'|'hold'|'lasso', startX, startY}
let holding = null; // {item, start}
let lasso = null;   // なわ捕獲 {pts:[{x,y}], wind:Map(item→まきつき角)}
let cursorPos = null; // あみカーソルの位置 {x,y,touch}
let lastTapT = -1, lastTapX = 0, lastTapY = 0; // ダブルクリック判定用

function hitTest(px, py, factor){
  const f = factor || 1;
  const alive = aliveItems()
    .map(it => ({ it, p: project(it.az, it.el + bob(it), it.r) }))
    .filter(o => o.p);
  alive.sort((a, b) => a.p.z - b.p.z); // ちかい順
  for (const { it, p } of alive){
    const size = itemSize(p.scale, it);
    if (Math.hypot(px - p.x, py - p.y) < Math.max(26, size * 0.8) * f) return it;
  }
  return null;
}
function bob(it){ return Math.sin(now * 0.9 + it.phase) * 0.018; }
function itemSize(scale, it){
  return Math.min(Math.max(scale * 0.62, 14), 105) * (it ? it.sizeF : 1);
}

canvas.addEventListener("pointerdown", e => {
  try { canvas.setPointerCapture(e.pointerId); } catch(_){ /* 合成イベント等 */ }
  state.lastAction = now;
  cursorPos = { x: e.clientX, y: e.clientY, touch: e.pointerType === "touch" };
  pointer = { x: e.clientX, y: e.clientY, startX: e.clientX, startY: e.clientY, mode: "pending" };
  // ダブルクリック(タップ)判定 — ゲーム時間はポーズで凍結するため実時間を使う
  const tapT = performance.now() / 1000;
  const isDouble = (tapT - lastTapT < 0.35) &&
    Math.hypot(e.clientX - lastTapX, e.clientY - lastTapY) < 40;
  lastTapT = tapT; lastTapX = e.clientX; lastTapY = e.clientY;
  if (!state.running) return;
  if (isDouble){
    // ダブルクリックしたまま描く → なわ(囲い)モード
    if (now < state.stunUntil){
      addMsg("動けません。正体を疑われています。", "#ff9d9d");
      pointer.mode = "drag";
      return;
    }
    pointer.mode = "lasso";
    lasso = { pts: [{ x: e.clientX, y: e.clientY }], wind: new Map() };
    return;
  }
  const it = hitTest(e.clientX, e.clientY);
  if (it){
    if (now < state.stunUntil){
      addMsg("動けません。正体を疑われています。", "#ff9d9d");
      pointer.mode = "drag";
      return;
    }
    pointer.mode = "hold";
    holding = { item: it, start: now };
    canvas.classList.add("holding");
  }
});
canvas.addEventListener("pointermove", e => {
  cursorPos = { x: e.clientX, y: e.clientY, touch: e.pointerType === "touch" };
  if (!pointer) return;
  const dx = e.clientX - pointer.x, dy = e.clientY - pointer.y;
  const totX = e.clientX - pointer.startX, totY = e.clientY - pointer.startY;
  if (pointer.mode === "hold" && Math.hypot(totX, totY) > 14){
    // アイテムの上からうごいた → ふつうの視点ドラッグに戻す
    holding = null;
    pointer.mode = "drag";
    canvas.classList.remove("holding");
  }
  if (pointer.mode === "lasso"){
    lassoMove(e.clientX, e.clientY);
  } else if (pointer.mode === "drag" || pointer.mode === "pending"){
    if (pointer.mode === "pending" && Math.hypot(totX, totY) > 4) pointer.mode = "drag";
    state.yaw -= dx * 0.0034;
    state.pitch += dy * 0.0034;
    state.pitch = Math.max(-1.1, Math.min(1.1, state.pitch));
    state.lastAction = now;
  }
  pointer.x = e.clientX; pointer.y = e.clientY;
});

/* なわ捕獲: ストロークが単語のまわりに 約0.85周まきつけば捕獲 */
function lassoMove(x, y){
  if (!lasso) return;
  const pts = lasso.pts;
  const last = pts[pts.length - 1];
  if (Math.hypot(x - last.x, y - last.y) < 4) return;
  pts.push({ x, y });
  if (pts.length > 240) pts.shift();
  if (!state.running) return;
  const hits = [];
  for (const it of aliveItems()){
    const p = project(it.az, it.el + bob(it), it.r);
    if (!p) continue;
    const a0 = Math.atan2(last.y - p.y, last.x - p.x);
    const a1 = Math.atan2(y - p.y, x - p.x);
    const w = (lasso.wind.get(it) || 0) + angDiff(a1 - a0);
    lasso.wind.set(it, w);
    // 囲みの中にお題の言葉が入っていれば回収。ハズレは素通し(ペナルティなし)。
    // ただしお題に一致するトラップは発動する (2026-07-17 レビュー反映)
    if (Math.abs(w) > 5.3 && firstKana(it.word) === state.requiredKana) hits.push(it);
  }
  if (hits.length){
    if (now < state.stunUntil){
      addMsg("動けません。正体を疑われています。", "#ff9d9d");
    } else {
      for (const it of hits) captureItem(it);
    }
    lasso.pts = [{ x, y }];   // ひとふでで連続捕獲できるようリセット
    lasso.wind = new Map();
    state.lastAction = now;
  }
}
function releasePointer(){
  pointer = null;
  holding = null;
  lasso = null;
  if (cursorPos && cursorPos.touch) cursorPos = null; // タッチはゆびをはなしたら消す
  canvas.classList.remove("holding");
}

/* 捕獲の共通判定 (長押し・なわ 共用) */
function captureItem(it){
  if (it.state !== "alive") return;
  if (firstKana(it.word) === state.requiredKana){
    playerPick(it);
  } else {
    addMsg(`「${itemDisp(it)}」は「${state.requiredKana}」から始まりません。`, "#ff9d9d");
    addMsg("落ち着いていきましょう。", "#9aa7cf", true);
    state.streak = 0;
    updateCombo();
    beep(220, .2, "triangle", .1);
  }
}
canvas.addEventListener("pointerup", releasePointer);
canvas.addEventListener("pointercancel", releasePointer);
canvas.addEventListener("contextmenu", e => e.preventDefault());

function holdUpdate(){
  if (!holding || !state.running) return;
  if (holding.item.state !== "alive"){ holding = null; return; }
  if ((now - holding.start) * 1000 >= HOLD_MS){
    const it = holding.item;
    holding = null;
    canvas.classList.remove("holding");
    captureItem(it);
    state.lastAction = now;
  }
}

/* ================= HUD ================= */
function updateHud(){
  odaiKanaEl.textContent = state.requiredKana;
  scoreYouEl.textContent = state.scoreYou;
  scoreCpuEl.textContent = state.scoreCpu;
  const recent = state.chainLog.slice(-5);
  chainEl.innerHTML = recent
    .map((w, i) => i === recent.length - 1 ? `<span class="now">${w}</span>` : w)
    .join(" → ") + " → ？";
}

/* ================= 描画 ================= */
function draw(){
  ctx.clearRect(0, 0, W, H);
  /* 世界(星・星雲・アイテム・UFO)はWebGL側 drawWorld() が描画。ここはオーバーレイのみ */

  // ながれぼし
  state.shots = state.shots.filter(s => now - s.start < s.life);
  for (const s of state.shots){
    const t = now - s.start;
    const x = s.x + s.vx * t, y = s.y + s.vy * t;
    ctx.globalAlpha = (1 - t / s.life) * 0.8;
    ctx.strokeStyle = "#cfe0ff";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - s.vx * 0.1, y - s.vy * 0.1);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // アイテム上のオーバーレイ装飾 (とおい順に)
  const drawList = [];
  for (const it of state.items){
    const el = it.el + bob(it);
    const p = project(it.az, el, it.r);
    if (!p) continue;
    drawList.push({ it, p });
  }
  drawList.sort((a, b) => b.p.z - a.p.z);

  for (const { it, p } of drawList){
    let size = itemSize(p.scale, it);
    let alpha = 1;
    if (it.state === "gone"){
      const t = (now - it.goneT) / 0.45;
      if (t >= 1) continue;
      alpha = 1 - t;
    }
    ctx.globalAlpha = alpha;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const ls = Math.max(10, size * 0.30);
    if (it.kanji && it.state === "gone"){
      // とったら よみが わかる (本体はWebGL側で描画)
      ctx.font = `bold ${Math.round(ls)}px "Hiragino Maru Gothic ProN","Hiragino Sans",sans-serif`;
      ctx.lineWidth = Math.max(2, ls * 0.28);
      ctx.strokeStyle = "rgba(5,8,18,.9)";
      ctx.strokeText(`（${it.word}）`, p.x, p.y + size * 0.68);
      ctx.fillStyle = "#ffe9c4";
      ctx.fillText(`（${it.word}）`, p.x, p.y + size * 0.68);
    }
    if (it.state === "alive"){
      // 高とくてんワードのきらめき (バッジ本体はWebGLテクスチャ側)
      if (it.len >= 5){
        ctx.fillStyle = "#ffd966";
        ctx.font = `${Math.round(Math.max(9, size * 0.3))}px sans-serif`;
        for (let k = 0; k < 2; k++){
          const a = now * 1.8 + it.phase + k * Math.PI;
          ctx.globalAlpha = alpha * (0.4 + 0.4 * (0.5 + 0.5 * Math.sin(now * 5 + k * 2)));
          ctx.fillText("✦", p.x + Math.cos(a) * size * 0.9, p.y + Math.sin(a) * size * 0.55);
        }
        ctx.globalAlpha = alpha;
      }
      // トラップは ときどき ひやあせをかく (気づく人は気づく)
      if (it.trap){
        const cyc = (now * 0.33 + it.phase) % 1;
        if (cyc < 0.16){
          ctx.globalAlpha = alpha * (1 - cyc / 0.16) * 0.85;
          ctx.font = `${Math.round(Math.max(10, size * 0.32))}px sans-serif`;
          ctx.fillText("💦", p.x + size * 0.55, p.y - size * 0.45);
        }
      }
    }
    ctx.globalAlpha = 1;

    // プレイヤーのあみ (ながおしで すぼまって つかまえる)
    if (holding && holding.item === it){
      const prog = Math.min((now - holding.start) * 1000 / HOLD_MS, 1);
      drawNet(p.x, p.y, size * (1.5 - 0.72 * prog), 0.9, prog, Math.PI / 4 + now * 0.6);
    }
    // CPUのホールドリング
    if (cpu.target === it && cpu.holdP > 0 && it.state === "alive"){
      ctx.beginPath();
      ctx.strokeStyle = "#ff6f6f";
      ctx.lineWidth = 5;
      ctx.arc(p.x, p.y, size * 0.92, -Math.PI / 2, -Math.PI / 2 + Math.min(cpu.holdP, 1) * Math.PI * 2);
      ctx.stroke();
    }
  }

  // トラクタービーム (UFO本体・トレイルはWebGL側)
  if (state.running && cpu.target && cpu.target.state === "alive" && cpu.holdP > 0){
    const p = project(cpu.az, cpu.el, 9);
    const tp = project(cpu.target.az, cpu.target.el + bob(cpu.target), cpu.target.r);
    if (p && tp){
      const w1 = itemSize(tp.scale, cpu.target) * 0.9;
      const ang = Math.atan2(tp.y - p.y, tp.x - p.x) + Math.PI / 2;
      const c = Math.cos(ang), s = Math.sin(ang);
      const bg = ctx.createLinearGradient(p.x, p.y, tp.x, tp.y);
      bg.addColorStop(0, "rgba(140,240,255,.4)");
      bg.addColorStop(1, "rgba(140,240,255,.06)");
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.moveTo(p.x - c * 6, p.y - s * 6);
      ctx.lineTo(p.x + c * 6, p.y + s * 6);
      ctx.lineTo(tp.x + c * w1, tp.y + s * w1);
      ctx.lineTo(tp.x - c * w1, tp.y - s * w1);
      ctx.closePath();
      ctx.fill();
    }
  }

  // パーティクル
  state.particles = state.particles.filter(pt => now - pt.start < pt.life);
  for (const pt of state.particles){
    const t = now - pt.start;
    const k = t / pt.life;
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x + pt.vx * t, pt.y + pt.vy * t, pt.size * (1 - k * 0.6), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // スコアポップアップ
  state.popups = state.popups.filter(pp => now - pp.start < 1);
  for (const pp of state.popups){
    const t = now - pp.start;
    ctx.globalAlpha = t < 0.7 ? 1 : (1 - t) / 0.3;
    ctx.font = "bold 22px 'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineWidth = 5;
    ctx.strokeStyle = "rgba(5,8,18,.85)";
    ctx.strokeText(pp.text, pp.x, pp.y - t * 55);
    ctx.fillStyle = pp.color;
    ctx.fillText(pp.text, pp.x, pp.y - t * 55);
  }
  ctx.globalAlpha = 1;

  // なわ (囲いストローク)
  if (lasso && lasso.pts.length > 1){
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(lasso.pts[0].x, lasso.pts[0].y);
    for (let i = 1; i < lasso.pts.length; i++) ctx.lineTo(lasso.pts[i].x, lasso.pts[i].y);
    ctx.strokeStyle = "rgba(5,8,18,.7)";
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.strokeStyle = "#ffd966";
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // あみカーソル (ながおし中は アイテムのうえに 大きなあみが出る)
  if (cursorPos && !holding && (!cursorPos.touch || lasso)){
    drawNet(cursorPos.x, cursorPos.y, 15, lasso ? 0.7 : 0.4, 0, Math.PI / 4 + now * 0.4);
  }

  // ヒント: こたえのある方向のすみが そっとひかる (4びょう そうさなし)
  if (state.running && now - state.lastAction > 4 && now >= state.stunUntil){
    drawHintGlow();
  }

  // メッセージ
  state.msgs = state.msgs.filter(m => now - m.start < m.dur);
  let my = H * 0.30;
  for (const m of state.msgs){
    const t = (now - m.start) / m.dur;
    ctx.globalAlpha = t < 0.1 ? t / 0.1 : (t > 0.7 ? (1 - t) / 0.3 : 1);
    ctx.font = m.small
      ? "15px 'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif"
      : "bold 24px 'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineWidth = m.small ? 4 : 6;
    ctx.strokeStyle = "rgba(5,8,18,.85)";
    ctx.strokeText(m.text, W / 2, my - t * 22);
    ctx.fillStyle = m.color;
    ctx.fillText(m.text, W / 2, my - t * 22);
    ctx.globalAlpha = 1;
    my += m.small ? 24 : 34;
  }

  // ボーナスタイム演出 (きん色のビネット + バナー)
  if (state.running && state.bonus){
    const pulse = 0.5 + 0.5 * Math.sin(now * 5);
    const g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.75);
    g.addColorStop(0, "rgba(255,195,70,0)");
    g.addColorStop(1, `rgba(255,195,70,${0.06 + 0.05 * pulse})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 0.7 + 0.3 * pulse;
    ctx.font = "bold 19px 'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineWidth = 5;
    ctx.strokeStyle = "rgba(5,8,18,.85)";
    ctx.strokeText("⚡ ボーナスタイム ×2 ⚡", W / 2, 190);
    ctx.fillStyle = "#ffe066";
    ctx.fillText("⚡ ボーナスタイム ×2 ⚡", W / 2, 190);
    ctx.globalAlpha = 1;
  }

  // スタン表示
  if (state.running && now < state.stunUntil){
    ctx.font = "bold 30px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("💫", W / 2, H * 0.5 + Math.sin(now * 8) * 6);
  }

  // フラッシュ
  if (state.flash){
    const t = (now - state.flash.start) / 0.45;
    if (t >= 1){
      state.flash = null;
    } else {
      ctx.fillStyle = `rgba(${state.flash.color},${state.flash.a * (1 - t)})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

function drawHintGlow(){
  const valids = validItems();
  if (valids.length === 0) return;
  // いちばんちかい こたえ
  let best = null, bestD = Infinity;
  for (const it of valids){
    const d = Math.hypot(angDiff(it.az - state.yaw), it.el - state.pitch);
    if (d < bestD){ bestD = d; best = it; }
  }
  const p = project(best.az, best.el, best.r);
  if (p && p.x > 0 && p.x < W && p.y > 0 && p.y < H) return; // 見えていれば なにもしない
  // こたえのある方向の 画面のすみを そっとひからせる
  const dyaw = angDiff(best.az - state.yaw);
  const dp = best.el - state.pitch;
  const cx = dyaw >= 0 ? W : 0;
  const cy = -dp >= 0 ? H : 0;
  const pulse = 0.5 + 0.5 * Math.sin(now * 2.2);
  const rad = Math.min(W, H) * 0.35;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
  g.addColorStop(0, `rgba(255,217,102,${0.10 + 0.08 * pulse})`);
  g.addColorStop(1, "rgba(255,217,102,0)");
  ctx.fillStyle = g;
  ctx.fillRect(cx - rad, cy - rad, rad * 2, rad * 2);
}

/* ================= ゲームループ ================= */
let prevT = performance.now();
function loop(t){
  const dt = Math.min((t - prevT) / 1000, 0.1);
  prevT = t;
  now = t / 1000;
  // 非表示状態でロードされた等でサイズが変わっていたら追従
  if (W !== window.innerWidth || H !== window.innerHeight) resize();

  if (state.running){
    state.timeLeft -= dt;
    if (state.timeLeft <= 0){
      state.timeLeft = 0;
      endGame();
    }
    // ひとこと (真顔の進行アナウンス)
    if (!state.q45 && state.timeLeft <= 45){
      state.q45 = true;
      addMsg("折り返しです。地球の時間は、容赦がありません。", "#9aa7cf", true);
    }
    if (!state.q30 && state.timeLeft <= 30){
      state.q30 = true;
      addMsg("残り30秒。まだ挽回できます。たぶん。", "#9aa7cf", true);
    }
    // 残り10秒はボーナスタイム
    if (!state.bonus && state.timeLeft <= 10 && state.timeLeft > 0){
      state.bonus = true;
      addMsg("⚡ 夜明けが近い。得点 ×2", "#ffe066");
      flash("255,215,90", 0.2);
      beep(880, .12, "sine", .12); beep(1320, .2, "sine", .12, .1);
    }
    timebarEl.style.width = (state.timeLeft / GAME_SECONDS * 100) + "%";
    timeleftEl.textContent = Math.ceil(state.timeLeft);
    if (state.bonus) timebarEl.style.background = "linear-gradient(90deg,#ffd966,#ff9d4d)";
    else if (state.timeLeft < 15) timebarEl.style.background = "linear-gradient(90deg,#ff9d4d,#ff5c5c)";
    cpuUpdate(dt);
    holdUpdate();
    // アイテムのドリフト (ながいことばほど はやい)
    for (const it of state.items){
      if (it.state !== "alive") continue;
      it.az += it.vaz * dt;
      it.el += it.vel * dt;
      if (it.el > 0.52){ it.el = 0.52; it.vel = -Math.abs(it.vel); }
      if (it.el < -0.44){ it.el = -0.44; it.vel = Math.abs(it.vel); }
    }
    // あみが近づくと 言葉は逃げる (長い言葉ほど すばしっこい)
    if (cursorPos){
      const yawC = state.yaw + (cursorPos.x - W / 2) / focal;
      const pitC = state.pitch - (cursorPos.y - H / 2) / focal;
      const R = 130 / focal;
      for (const it of state.items){
        if (it.state !== "alive") continue;
        if (holding && holding.item === it) continue; // あみの中では観念する
        const dz = angDiff(it.az - yawC);
        const de = it.el - pitC;
        const d = Math.hypot(dz, de);
        if (d < R && d > 0.001){
          const fleeV = (0.05 + it.len * 0.015) * (1 - d / R);
          it.az += dz / d * fleeV * dt;
          it.el += de / d * fleeV * dt;
          it.scared = now;
        }
      }
    }
    // のこり5びょうカウント音
    const sec = Math.ceil(state.timeLeft);
    if (sec !== lastSec){
      lastSec = sec;
      if (sec <= 5 && sec > 0) beep(880, .07, "square", .05);
    }
    // ふるいゴーンアイテムをそうじ (GLテクスチャも解放)
    state.items = state.items.filter(it => {
      const keep = it.state === "alive" || now - it.goneT < 1;
      if (!keep) freeItemTex(it);
      return keep;
    });
  }
  // ながれぼしをたまに わかす
  if (Math.random() < dt * 0.35){
    state.shots.push({
      x: Math.random() * W, y: Math.random() * H * 0.6,
      vx: -(250 + Math.random() * 350), vy: 80 + Math.random() * 120,
      start: now, life: 0.9
    });
  }
  // 画面シェイク = カメラの揺れとして両レイヤーに適用
  if (state.shake){
    const t = (now - state.shake.start) / 0.35;
    if (t >= 1){ state.shake = null; shakeYaw = 0; shakePitch = 0; }
    else {
      const a = state.shake.amp * (1 - t) / focal;
      shakeYaw = (Math.random() * 2 - 1) * a;
      shakePitch = (Math.random() * 2 - 1) * a;
    }
  } else { shakeYaw = 0; shakePitch = 0; }
  drawWorld();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= 開始 / 終了 ================= */
let lastDiffKey = "normal";
let pendingNext = null; // 結果画面の「次のステップ」導線
function startGame(diffKey){
  lastDiffKey = diffKey;
  state.diff = DIFFS[diffKey];
  state.running = true;
  for (const it of state.items) freeItemTex(it);
  state.items = [];
  state.usedWords = new Set(["しりとり"]);
  state.requiredKana = "り";
  state.chainLog = ["しりとり"];
  state.scoreYou = 0; state.scoreCpu = 0;
  state.streak = 0;
  state.timeLeft = GAME_SECONDS;
  state.stunUntil = 0;
  state.msgs = [];
  state.particles = [];
  state.popups = [];
  state.flash = null;
  state.bestWord = "";
  state.bestDisp = "";
  state.bonus = false;
  state.q45 = false; state.q30 = false;
  state.shake = null;
  state.dict = PACKS[selectedPack];
  lastSec = -1;
  cpuTrail.length = 0;
  updateCombo();
  state.yaw = 0; state.pitch = 0;
  state.lastAction = now;
  cpu.az = Math.PI; cpu.el = 0.3;
  cpu.target = null; cpu.holdP = 0;
  cpu.wait = rand(state.diff.reaction[0] + 1, state.diff.reaction[1] + 1.5);
  timebarEl.style.background = "linear-gradient(90deg,#4dd2ff,#4d7cff)";
  ensureAnswers();
  overlayEl.classList.add("hidden");
  hud.style.display = "";
  chainEl.style.display = "";
  updateHud();
  addMsg(`研修開始。まずは「${state.requiredKana}」から。`, "#8fd8ff");
}

function bitterComment(you, cp){
  if (you > cp * 2 && you > 0) return "即戦力認定です。母星が誇りに思うでしょう。たぶん。";
  if (you > cp) return "修了です。日本で、うまくやってください。";
  if (you === cp) return "保留。母星も判断に迷っています。";
  if (you * 2 < cp) return "同期はもう日本に発ちました。あなたはここで、もう90秒です。";
  return "再研修です。よくあることです。よくあってはいけないのですが。";
}

function endGame(reason){
  if (!state.running) return;
  state.running = false;
  holding = null;
  const you = state.scoreYou, cp = state.scoreCpu;
  const title = you > cp ? "🎓 研修修了" : you < cp ? "🔁 再研修" : "📎 判定保留";
  if (you > cp) record.w++; else if (you < cp) record.l++; else record.d++;
  saveRecord();
  document.getElementById("resultTitle").textContent = title;
  document.getElementById("resultDetail").innerHTML =
    `<i style="color:#9aa7cf">${bitterComment(you, cp)}</i><br><br>` +
    (reason === "ことばぎれ" ? "辞書の言葉を使い切りました。<br>" : "") +
    `あなた <b style="color:#ffd966">${you}</b> — 同期 <b style="color:#ff8a8a">${cp}</b><br>` +
    `つないだ言葉: ${state.chainLog.length - 1}` +
    (state.bestWord ? `<br>最長回収: <b style="color:#ffd966">${state.bestDisp}</b> (+${wordPoints(state.bestWord)})` : "") +
    `<br>通算成績: ${recordText()}`;
  document.getElementById("resultChain").textContent = state.chainLog.join(" → ");
  // 次のステップへの導線 (勝てば昇格、激務クリアで転属、負ければ降格の打診)
  pendingNext = null;
  let nextComment = "", nextLabel = "";
  if (you > cp){
    if (lastDiffKey === "easy"){
      pendingNext = { diff: "normal", pack: selectedPack };
      nextComment = "「接待」課程を修了。次は「定時」が推奨されています。";
      nextLabel = "「定時」で研修";
    } else if (lastDiffKey === "normal"){
      pendingNext = { diff: "hard", pack: selectedPack };
      nextComment = "「定時」課程を修了。「激務」への昇格が内示されました。";
      nextLabel = "「激務」で研修";
    } else {
      const order = ["emoji", "kanji", "bitter"];
      const p2 = order[(order.indexOf(selectedPack) + 1) % order.length];
      pendingNext = { diff: "hard", pack: p2 };
      nextComment = `「激務」を修了。「${PACK_LABELS[p2]}」課程への転属が命じられました。`;
      nextLabel = `「${PACK_LABELS[p2]}」へ転属`;
    }
  } else if (you < cp && lastDiffKey === "hard"){
    pendingNext = { diff: "normal", pack: selectedPack };
    nextComment = "「定時」への配置転換が検討されています。";
    nextLabel = "「定時」で再研修";
  } else if (you < cp && lastDiffKey === "normal"){
    pendingNext = { diff: "easy", pack: selectedPack };
    nextComment = "「接待」課程からやり直すことも可能です。";
    nextLabel = "「接待」で再研修";
  }
  document.getElementById("nextComment").textContent = nextComment;
  const btnNextEl = document.getElementById("btnNext");
  btnNextEl.textContent = nextLabel;
  btnNextEl.style.display = pendingNext ? "" : "none";
  startPanel.style.display = "none";
  resultPanel.style.display = "";
  overlayEl.classList.remove("hidden");
}

/* イントロ (辞令) の表示制御 */
const introPanel = document.getElementById("introPanel");
function showIntro(){
  startPanel.style.display = "none";
  resultPanel.style.display = "none";
  introPanel.style.display = "";
  overlayEl.classList.remove("hidden");
}
function showStart(){
  introPanel.style.display = "none";
  resultPanel.style.display = "none";
  startPanel.style.display = "";
  updateRecordLine();
}
document.getElementById("btnIntroNext").addEventListener("click", () => {
  try { localStorage.setItem("shiritori3d_introSeen", "1"); } catch(e){ /* noop */ }
  showStart();
});
document.getElementById("storyLink").addEventListener("click", showIntro);
(() => {
  let seen = false;
  try { seen = !!localStorage.getItem("shiritori3d_introSeen"); } catch(e){ /* noop */ }
  if (!seen) showIntro();
})();

let selectedPack = "bitter";
const packBtns = {
  emoji: document.getElementById("packEmoji"),
  kanji: document.getElementById("packKanji"),
  bitter: document.getElementById("packBitter")
};
for (const key of Object.keys(packBtns)){
  packBtns[key].addEventListener("click", () => {
    selectedPack = key;
    for (const k2 of Object.keys(packBtns)) packBtns[k2].classList.toggle("sel", k2 === key);
  });
}

document.getElementById("btnEasy").addEventListener("click", () => startGame("easy"));
document.getElementById("btnNormal").addEventListener("click", () => startGame("normal"));
document.getElementById("btnHard").addEventListener("click", () => startGame("hard"));

/* TOP画面へ戻る */
function goTop(){
  resultPanel.style.display = "none";
  startPanel.style.display = "";
  overlayEl.classList.remove("hidden");
  hud.style.display = "none";
  chainEl.style.display = "none";
  updateRecordLine();
}
/* もういちど: 同じ設定で即再戦 */
document.getElementById("btnRetry").addEventListener("click", () => {
  resultPanel.style.display = "none";
  startPanel.style.display = "";
  startGame(lastDiffKey);
});
document.getElementById("btnTop").addEventListener("click", goTop);
/* 次のステップ: パック/難易度を切り替えて即研修 */
document.getElementById("btnNext").addEventListener("click", () => {
  if (!pendingNext) return;
  selectedPack = pendingNext.pack;
  for (const k of Object.keys(packBtns)) packBtns[k].classList.toggle("sel", k === selectedPack);
  resultPanel.style.display = "none";
  startPanel.style.display = "";
  startGame(pendingNext.diff);
});
/* 降参: 1敗としてカウントしてTOPへ */
document.getElementById("btnSurrender").addEventListener("click", () => {
  if (!state.running) return;
  state.running = false;
  holding = null;
  lasso = null;
  record.l++;
  saveRecord();
  goTop();
});
updateRecordLine();

/* debug hook */
window.__dbg = {
  state, cpu,
  project: (az, el, r) => project(az, el, r),
  validItems, hitTest,
  screenItems(){
    return aliveItems().map(it => {
      const p = project(it.az, it.el + bob(it), it.r);
      return p ? { word: it.word, trap: it.trap, x: p.x, y: p.y, z: p.z } : null;
    }).filter(Boolean);
  }
};

})();
</script>
